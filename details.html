<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE COLLECTION | SEIN MOTORS</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Catalog Styling */
        .stock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            padding: 50px 5%;
        }

        .stock-card {
            background: #0a0a0a;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .stock-card:hover {
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-10px);
        }

        .stock-img-wrap {
            width: 100%;
            aspect-ratio: 16/10;
            overflow: hidden;
            background: #111;
        }

        .stock-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s ease;
            filter: grayscale(30%);
        }

        .stock-card:hover .stock-img-wrap img {
            transform: scale(1.1);
            filter: grayscale(0%);
        }

        .stock-info {
            padding: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stock-name {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: #fff;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .stock-desc {
            font-size: 0.85rem;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.5);
            height: 3em; /* Limits height to 2 lines */
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .view-cta {
            margin-top: 20px;
            font-size: 10px;
            letter-spacing: 3px;
            color: #fff;
            opacity: 0.4;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stock-card:hover .view-cta {
            opacity: 1;
        }

        /* Loading State */
        .loading-screen {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        body:not(.loading) .loading-screen { opacity: 0; pointer-events: none; }
    </style>
</head>
<body class="loading">
    <div class="loading-screen"><span>LOADING SEIN STOCK...</span></div>
    <div class="bg-grid"></div>

    <nav class="navbar active">
        <div class="nav-inner">
            <a href="index.html"><img src="propoerties/sein logo.png" class="nav-logo" alt="SEIN MOTORS"></a>
            <ul class="nav-links">
                <li><a href="index.html" class="nav-item">HOME</a></li>
                <li><a href="collection.html" class="nav-item active-link">THE COLLECTION</a></li>
                <li><a href="#" class="nav-item">CONTACT</a></li>
            </ul>
        </div>
    </nav>

    <header class="stock-header" style="padding-top: 150px; text-align: center;">
        <h1 style="font-size: 4rem; letter-spacing: -2px;">THE COLLECTION</h1>
        <div class="title-line-short" style="margin: 20px auto;"></div>
    </header>

    <main class="stock-grid" id="mainInventory">
        </main>

    <script>
        window.addEventListener('load', () => {
            // Fetch the JSON with a timestamp to prevent the browser from caching old data
            fetch('inventory.json?v=' + Date.now())
                .then(response => {
                    if (!response.ok) throw new Error("JSON file not found");
                    return response.json();
                })
                .then(data => {
                    const grid = document.getElementById('mainInventory');
                    grid.innerHTML = ''; 
                    
                    data.forEach(car => {
                        const card = document.createElement('div');
                        card.className = "stock-card";
                        
                        // Clicking this card sends the user to details.html?id=X
                        card.innerHTML = `
                            <a href="details.html?id=${car.id}" style="text-decoration: none; color: inherit;">
                                <div class="stock-img-wrap">
                                    <img src="${car.image}" alt="${car.name}">
                                </div>
                                <div class="stock-info">
                                    <p class="stock-name">${car.year} ${car.name}</p>
                                    <p class="stock-desc">${car.description || 'No description available.'}</p>
                                    <div class="view-cta">VIEW DETAILS <span>→</span></div>
                                </div>
                            </a>
                        `;
                        grid.appendChild(card);
                    });
                    
                    document.body.classList.remove('loading');
                })
                .catch(err => {
                    console.error("Error:", err);
                    document.getElementById('mainInventory').innerHTML = `<p style="color:red; text-align:center; grid-column: 1/-1;">ERROR LOADING STOCK: ${err.message}</p>`;
                    document.body.classList.remove('loading');
                });
        });
    </script>
</body>
</html>
