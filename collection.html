<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE COLLECTION | SEIN MOTORS</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .stock-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; padding: 150px 5% 50px; }
        .stock-card { background: #0a0a0a; border: 1px solid rgba(255,255,255,0.05); transition: 0.4s; cursor: pointer; }
        .stock-card:hover { border-color: #fff; transform: translateY(-5px); }
        .stock-img-wrap { width: 100%; aspect-ratio: 16/9; overflow: hidden; }
        .stock-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .stock-card:hover img { transform: scale(1.05); }
        .stock-info { padding: 25px; }
        .stock-name { font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
        .stock-desc { font-size: 0.85rem; color: rgba(255,255,255,0.5); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <nav class="navbar active">
        <div class="nav-inner">
            <a href="index.html"><img src="propoerties/sein logo.png" class="nav-logo"></a>
            <ul class="nav-links">
                <li><a href="index.html" class="nav-item">HOME</a></li>
                <li><a href="collection.html" class="nav-item active-link">THE COLLECTION</a></li>
            </ul>
        </div>
    </nav>

    <main class="stock-grid" id="mainInventory"></main>

    <script>
        fetch('inventory.json?v=' + Date.now())
            .then(res => res.json())
            .then(data => {
                const grid = document.getElementById('mainInventory');
                data.forEach(car => {
                    const card = document.createElement('div');
                    card.className = "stock-card";
                    card.innerHTML = `
                        <a href="details.html?id=${car.id}" style="text-decoration: none; color: inherit;">
                            <div class="stock-img-wrap"><img src="${car.image}"></div>
                            <div class="stock-info">
                                <p class="stock-name">${car.year} ${car.name}</p>
                                <p class="stock-desc">${car.description}</p>
                                <p style="margin-top:15px; font-size:10px; opacity:0.5;">VIEW DETAILS →</p>
                            </div>
                        </a>`;
                    grid.appendChild(card);
                });
            });
    </script>
</body>
</html>
